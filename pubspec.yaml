name: fat_burner
description: A health tracking app for fitness and wellness goals.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.0
  

  # Firebase (must run: dart run flutterfire_cli:flutterfire configure)
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2
  cloud_functions: ^6.0.7
  fl_chart: ^0.68.0

  # Health data (HealthKit on iOS, Health Connect on Android)
  health: ^13.3.1

  # HTTP requests
  dio: ^5.9.2

  # State management
  provider: ^6.1.5
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10
  animate_do: ^3.3.4
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  intl: ^0.20.2
  google_sign_in: ^6.1.4
  flutter_heatmap_calendar: ^1.0.5
  image_picker: ^1.2.1
  firebase_storage: ^13.2.0
  sign_in_with_apple: ^7.0.1
  in_app_review: ^2.0.11
  table_calendar: ^3.2.0
  google_mlkit_image_labeling: ^0.14.2
  flutter_local_notifications: ^21.0.0
  shared_preferences: ^2.5.5
  timezone: ^0.11.0
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.2
  google_mlkit_text_recognition: ^0.15.1

dependency_overrides:
  intl: ^0.20.2

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true


  assets:
    - images/

flutter_icons:
  android: true
  ios: true
  image_path: "images/LLOGO.jpeg"   
